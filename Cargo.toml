[package]
name = "rustre"
version = "0.1.0"
edition = "2021"
description = "A parallel, distributed file system inspired by Lustre, implemented in Rust"

[[bin]]
name = "rustre"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1"
async-trait = "0.1"
bytes = "1"
crc32fast = "1"
dashmap = "5"
futures = "0.3"
toml = "0.8"
dirs = "5"
anyhow = "1"
